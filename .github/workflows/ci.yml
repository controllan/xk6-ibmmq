# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install IBM MQ Client
        run: |
          sudo apt-get update
          sudo apt-get install -y libmq-dev

      - name: Run tests with coverage
        run: go test ./... -v -coverprofile=coverage.out
        env:
          CGO_ENABLED: '1'

      - name: SonarQube Analysis
        uses: ./.github/actions/sonarqube
        with:
          project-key: controllan_xk6-ibmmq
          coverage-file: coverage.out
          sonar-token: ${{ secrets.SONAR_TOKEN }}
          sonar-host-url: ${{ secrets.SONAR_HOST_URL }}

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install IBM MQ Client
        run: |
          sudo apt-get update
          sudo apt-get install -y libmq-dev

      - name: Build
        run: ./build.sh
        env:
          CGO_ENABLED: '1'
