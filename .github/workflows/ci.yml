# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install IBM MQ Client
        run: |
          cd /tmp
          curl -fsSL "https://public.dhe.ibm.com/ibmdl/export/pub/software/websphere/messaging/mqdev/redist/IBM-MQC-Redist-LinuxX64.tar.gz" -o mq.tar.gz
          sudo mkdir -p /opt/mqm
          sudo tar -xzf mq.tar.gz -C /opt/mqm
          rm mq.tar.gz

      - name: Run tests with coverage
        run: go test ./... -v -coverprofile=coverage.out
        env:
          CGO_ENABLED: '1'
          CGO_CFLAGS: '-I/opt/mqm/inc'
          CGO_LDFLAGS: '-L/opt/mqm/lib64 -lmqm -lmqic -lpthread'

      - name: SonarQube Analysis
        uses: ./.github/actions/sonarqube
        with:
          project-key: controllan_xk6-ibmmq
          coverage-file: coverage.out
          sonar-token: ${{ secrets.SONAR_TOKEN }}
          sonar-host-url: ${{ secrets.SONAR_HOST_URL }}

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install IBM MQ Client
        run: |
          cd /tmp
          curl -fsSL "https://public.dhe.ibm.com/ibmdl/export/pub/software/websphere/messaging/mqdev/redist/IBM-MQC-Redist-LinuxX64.tar.gz" -o mq.tar.gz
          sudo mkdir -p /opt/mqm
          sudo tar -xzf mq.tar.gz -C /opt/mqm
          rm mq.tar.gz

      - name: Build
        run: ./build.sh
        env:
          CGO_ENABLED: '1'
          CGO_CFLAGS: '-I/opt/mqm/inc'
          CGO_LDFLAGS: '-L/opt/mqm/lib64 -lmqm -lmqic -lpthread'
